services:
  db:
    image: pgvector/pgvector:pg16
    container_name: holisticare_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: holisticare_backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Safer default: opt in via .env for local dev (see .env.example).
      ALLOW_DEV_AUTH: "${ALLOW_DEV_AUTH:-false}"
      # Optional: clinic-specific nutrition safety synonym JSON (US-RAG-004). Unset uses bundled
      # backend/app/config/nutrition_safety_terms.json. Path is resolved inside the container (cwd /app).
      NUTRITION_SAFETY_TERMS_PATH: "${NUTRITION_SAFETY_TERMS_PATH:-}"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: holisticare_frontend
    restart: unless-stopped
    environment:
      VITE_PROXY_TARGET: "http://backend:8000"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:
