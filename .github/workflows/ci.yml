# Backend: pytest with mocks (no Docker/DB keys). Frontend: lint, unit tests, production build.
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -q --tb=short

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm run test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E smoke
        run: npm run test:e2e

      - name: Vite build
        run: npm run build

  security-audit:
    runs-on: ubuntu-latest
    # Blocking by default. Set repository variable SECURITY_AUDIT_ADVISORY=true
    # to keep this job non-blocking while triaging findings.
    continue-on-error: ${{ vars.SECURITY_AUDIT_ADVISORY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies and scanners
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pip-audit bandit

      - name: Run pip-audit
        run: pip-audit -r backend/requirements.txt

      - name: Run bandit
        run: bandit -r backend/app

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        working-directory: frontend

  ai-quality-smoke:
    runs-on: ubuntu-latest
    # Blocking by default. Set AI_QUALITY_SMOKE_ADVISORY=true to make advisory.
    continue-on-error: ${{ vars.AI_QUALITY_SMOKE_ADVISORY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare .env for docker compose
        run: |
          cp .env.example .env
          sed -i "s|^MIN_EVIDENCE_LEVEL=.*|MIN_EVIDENCE_LEVEL=expert_opinion|" .env
          if [ -n "${OPENAI_API_KEY}" ]; then
            sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=${OPENAI_API_KEY}|" .env
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Start stack
        run: docker compose up -d --build

      - name: Ingest CI smoke corpus
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY missing; skipping ingestion and AI quality smoke."
            exit 0
          fi
          docker compose exec -T backend env PYTHONPATH=/app python scripts/run_corpus_ingest.py --source-dir data/ci_smoke --force-reindex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run AI quality smoke
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY missing; skipping AI quality smoke."
            exit 0
          fi
          docker compose exec -T backend env PYTHONPATH=/app python scripts/ai_quality_smoke.py --require-any-citations
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
