# Backend: pytest with mocks (no Docker/DB keys). Frontend: lint, unit tests, production build.
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -q --tb=short

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm run test

      - name: Vite build
        run: npm run build

  security-audit:
    runs-on: ubuntu-latest
    # Advisory by default. Set repository variable SECURITY_AUDIT_BLOCKING=true
    # to make this job blocking without changing workflow code.
    continue-on-error: ${{ vars.SECURITY_AUDIT_BLOCKING != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies and scanners
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pip-audit bandit

      - name: Run pip-audit (advisory)
        run: pip-audit -r backend/requirements.txt

      - name: Run bandit (advisory)
        run: bandit -r backend/app

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run npm audit (advisory)
        run: npm audit --audit-level=moderate
        working-directory: frontend
